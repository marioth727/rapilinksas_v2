server {
    listen 80;
    server_name localhost;

    # Directorio de archivos estáticos
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Lógica fundamental para React Router (SPAs)
    # Intenta servir el archivo solicitado ($uri), luego como carpeta ($uri/), 
    # y si no lo encuentra, redirige todo a index.html para que React maneje la ruta.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Configuración de caché para assets locales para mejorar el rendimiento
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Caché suave para imágenes (recursos y otros)
    location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Manejo de errores 50x estándar
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
